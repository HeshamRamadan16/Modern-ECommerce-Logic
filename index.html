<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تكنو ستور </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <nav class="navbar navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">تكنو ستور</a>
            <div id="cartIcon" class="position-relative" style="cursor: pointer;">
                <i class="fas fa-shopping-basket fa-2x text-primary"></i>
                <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <h2 class="text-center mb-5 fw-bold">أحدث المنتجات</h2>
        <div class="row g-4" id="productsGrid">
            </div>
    </main>

    <aside id="cartSidebar" class="cart-sidebar shadow-lg">
        <div class="p-3 border-bottom d-flex justify-content-between">
            <h5 class="m-0">سلة التسوق</h5>
            <button class="btn-close" id="closeCart"></button>
        </div>
        <div id="cartItems" class="p-3 flex-grow-1 overflow-auto">
            </div>
        <div class="p-3 border-top bg-light">
            <h5 class="d-flex justify-content-between">
                <span>الإجمالي:</span>
                <span id="cartTotal">0</span> جنيه
            </h5>
            <button class="btn btn-primary w-100 mt-3 py-2 fw-bold" onclick="checkout()">إتمام الطلب</button>
        </div>
    </aside>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
